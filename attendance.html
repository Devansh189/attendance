    <div class="loading-text">Loading your attendance…</div>
  </div>

<style>

  .score-row {

  .score-pct.safe { color: var(--safe); }
  .score-pct.danger { color: var(--danger); }

  .score-frac {

  .bunk-line {
    font-size: 12px;
    color: var(--text-secondary);
    margin: 8px 0 12px;
    min-height: 15px;
  }
  .bunk-line.safe { color: var(--safe); }
  .bunk-line.danger { color: var(--danger); }

  .status-row {
    display: flex;
    gap: 6px;
  }
  .status-btn {
    flex: 1;
    padding: 10px 4px;
    border-radius: 9px;
    border: 1px solid var(--border);
    background: var(--bg-elevated-2);
    color: var(--text-secondary);
    font-family: 'Inter', sans-serif;
    font-weight: 600;
    font-size: 12.5px;
    cursor: pointer;
    transition: transform 0.08s ease, background 0.15s ease, color 0.15s ease, border-color 0.15s ease;
  }
  .status-btn:active { transform: scale(0.96); }
  .status-btn.active-present { background: var(--safe-dim); border-color: var(--safe); color: var(--safe); }
  .status-btn.active-absent { background: var(--danger-dim); border-color: var(--danger); color: var(--danger); }
  .status-btn.active-cancelled { background: var(--bg-elevated-2); border-color: var(--accent); color: var(--accent); }

  .status-btn:focus-visible, .delete-btn:focus-visible, select:focus-visible, .add-input:focus-visible, .add-btn:focus-visible, .history-toggle:focus-visible {

  .history-toggle {
    display: block;
    width: 100%;

    margin-top: 10px;
    border-top: 1px solid var(--border);
    cursor: pointer;
  }
  .history-toggle:hover { color: var(--text-secondary); }

  .history-panel {
    margin-top: 10px;
  }
  .history-list {
    max-height: 220px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 4px;
    margin-bottom: 10px;
    padding-right: 2px;
  }
  .history-empty {
    color: var(--text-tertiary);
    font-size: 12px;
    margin-bottom: 10px;
  }
  .history-row {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 6px 8px;
    background: var(--bg-elevated-2);
    border-radius: 7px;
    font-size: 12px;
  }
  .history-date {
    font-family: 'JetBrains Mono', monospace;
    color: var(--text-secondary);
    flex: 1;
  }
  .history-status {
    font-weight: 600;
    font-size: 11px;
  }
  .history-status.safe { color: var(--safe); }
  .history-status.danger { color: var(--danger); }

  .history-remove {
    background: none;
    border: none;
    color: var(--text-tertiary);
    font-size: 14px;

  .backfill-row {
    display: flex;

  .backfill-row .add-input {

  }
  .backfill-row .add-btn {

  }

  .add-card {
    background: var(--bg-elevated);
    border: 1px dashed var(--border);
    border-radius: 14px;
    padding: 14px 16px;
  }
  .add-row {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }
  .add-input {
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text-primary);
    border-radius: 8px;
    padding: 9px 10px;
    font-size: 13.5px;
    font-family: 'Inter', sans-serif;
  }
  .add-input.code { width: 90px; }
  .add-input.name { flex: 1; min-width: 140px; }
  .add-btn {
    background: var(--accent);
    color: #1a1206;
    border: none;
    border-radius: 8px;
    padding: 9px 16px;
    font-weight: 700;
    font-size: 13px;
    cursor: pointer;
  }
  .add-btn:active { transform: scale(0.97); }

  .footer-note {
    text-align: center;
    color: var(--text-tertiary);
    font-size: 11.5px;
    margin-top: 28px;
    line-height: 1.6;
  }
  .reset-link {
    color: var(--text-tertiary);
    text-decoration: underline;
    cursor: pointer;
    background: none;
    border: none;
    font-size: 11.5px;
    font-family: inherit;
  }
  .reset-link:hover { color: var(--danger); }

  @media (prefers-reduced-motion: reduce) {
    * { transition: none !important; }
  }
</style>

<script>
(function () {
  const STORAGE_KEY = 'attendance-tracker-data';

  const DEFAULT_SUBJECTS = [
    { code: 'CSBB 202', name: 'Design and Analysis of Algorithms', history: {} },
    { code: 'CSBB 203', name: 'Operating System', history: {} },
    { code: 'CSBB 204', name: 'Database Management Systems', history: {} },
    { code: 'MALB 202', name: 'Probability and Statistics', history: {} },
    { code: 'ECBB 206', name: 'Digital Electronics and Logic Design', history: {} }
  ];

  let data = null;
  let storageAvailable = true;
  const expandedHistory = new Set();

  // In-memory fallback if window.storage isn't present (e.g. opened outside Claude)
  const memoryFallback = {};
  const storage = (typeof window.storage !== 'undefined') ? window.storage : {
    async get(key) {
      if (!(key in memoryFallback)) throw new Error('not found');
      return { key, value: memoryFallback[key], shared: false };
    },
    async set(key, value) {
      memoryFallback[key] = value;
      return { key, value, shared: false };
    }
  };
  if (typeof window.storage === 'undefined') storageAvailable = false;

  function todayStr() {
    const d = new Date();
    return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
  }

  function todayDisplay() {
    return new Date().toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' });
  }

  async function loadData() {
    try {
      const result = await storage.get(STORAGE_KEY, false);
      const parsed = JSON.parse(result.value);
      if (!parsed.subjects) throw new Error('bad shape');
      if (typeof parsed.threshold !== 'number') parsed.threshold = 0.75;
      return parsed;
    } catch (e) {
      const fresh = { subjects: DEFAULT_SUBJECTS.map(s => ({ ...s, history: {} })), threshold: 0.75 };
      await persist(fresh);
      return fresh;
    }
  }

  async function persist(d) {
    try {
      await storage.set(STORAGE_KEY, JSON.stringify(d), false);
    } catch (e) {
      console.error('Storage save failed', e);
    }
  }

  function computeStats(subject) {
    let attended = 0, total = 0;
    for (const date in subject.history) {
      const status = subject.history[date];
      if (status === 'present') { attended++; total++; }
      else if (status === 'absent') { total++; }
    }
    const pct = total > 0 ? attended / total : null;
    return { attended, total, pct };
  }

  function bunkInfo(attended, total, threshold) {
    if (total === 0) return { type: 'none' };
    const pct = attended / total;
    if (pct >= threshold) {
      let skip = 0;
      while (attended / (total + skip + 1) >= threshold && skip < 500) skip++;
      return { type: 'skip', value: skip };
    } else {
      let need = 0;
      while ((attended + need) / (total + need) < threshold && need < 500) need++;
      return { type: 'need', value: need };
    }
  }

  function statusClass(pct, threshold) {
    if (pct === null) return 'neutral';
    return pct >= threshold ? 'safe' : 'danger';
  }

  function fmtPct(pct) {
    return pct === null ? '—' : (pct * 100).toFixed(1) + '%';
  }

  // ---- Actions (exposed to inline handlers) ----

  window.markStatus = async function (index, status) {
    const today = todayStr();
    const subj = data.subjects[index];
    if (subj.history[today] === status) {
      delete subj.history[today]; // tap again to unmark
    } else {
      subj.history[today] = status;
    }
    await persist(data);
    render();
  };

  window.deleteSubject = async function (index) {
    const subj = data.subjects[index];
    if (!confirm('Remove "' + subj.name + '" from your tracker? This deletes its attendance history.')) return;
    data.subjects.splice(index, 1);
    await persist(data);
    render();
  };

  window.addSubject = async function () {
    const codeInput = document.getElementById('new-code');
    const nameInput = document.getElementById('new-name');
    const code = codeInput.value.trim();
    const name = nameInput.value.trim();
    if (!name) { nameInput.focus(); return; }
    data.subjects.push({ code: code || '—', name, history: {} });
    codeInput.value = '';
    nameInput.value = '';
    await persist(data);
    render();
  };

  window.toggleHistory = function (index) {
    if (expandedHistory.has(index)) expandedHistory.delete(index);
    else expandedHistory.add(index);
    render();
  };

  window.deleteHistoryEntry = async function (index, date) {
    delete data.subjects[index].history[date];
    await persist(data);
    render();
  };

  window.backfill = async function (index) {
    const dateEl = document.getElementById('backfill-date-' + index);
    const statusEl = document.getElementById('backfill-status-' + index);
    if (!dateEl.value) { dateEl.focus(); return; }
    data.subjects[index].history[dateEl.value] = statusEl.value;
    await persist(data);
    render();
  };

  window.changeThreshold = async function (val) {
    data.threshold = parseFloat(val);
    await persist(data);
    render();
  };

  window.resetAll = async function () {
    if (!confirm('Reset ALL attendance data? This cannot be undone.')) return;
    data = { subjects: DEFAULT_SUBJECTS.map(s => ({ ...s, history: {} })), threshold: 0.75 };
    await persist(data);
    render();
  };

  // ---- Render ----

  function render() {
    const threshold = data.threshold;
    const today = todayStr();

    let totalAttended = 0, totalClasses = 0;
    const subjectCards = data.subjects.map((subj, i) => {
      const { attended, total, pct } = computeStats(subj);
      totalAttended += attended;
      totalClasses += total;
      const cls = statusClass(pct, threshold);
      const bunk = bunkInfo(attended, total, threshold);
      let bunkText = '';
      let bunkCls = '';
      if (bunk.type === 'none') {
        bunkText = 'No classes marked yet';
      } else if (bunk.type === 'skip') {
        bunkText = bunk.value > 0 ? ('Can skip ' + bunk.value + ' more and stay safe') : 'Right at the edge — don\'t skip the next one';
        bunkCls = 'safe';
      } else {
        bunkText = 'Attend next ' + bunk.value + ' in a row to recover';
        bunkCls = 'danger';
      }
      const todayStatus = subj.history[today];
      const isExpanded = expandedHistory.has(i);

      let historyPanel = '';
      if (isExpanded) {
        const dates = Object.keys(subj.history).sort().reverse();
        let listHtml;
        if (dates.length === 0) {
          listHtml = '<div class="history-empty">No days logged yet.</div>';
        } else {
          const rows = dates.map(date => {
            const status = subj.history[date];
            const label = status === 'present' ? 'Present' : status === 'absent' ? 'Absent' : 'No Class';
            const rowCls = status === 'present' ? 'safe' : status === 'absent' ? 'danger' : 'neutral';
            const dispDate = new Date(date + 'T00:00:00').toLocaleDateString('en-US', { month: 'short', day: 'numeric', weekday: 'short' });
            return `
              <div class="history-row">
                <span class="history-date">${dispDate}</span>
                <span class="history-status ${rowCls}">${label}</span>
                <button class="history-remove" onclick="deleteHistoryEntry(${i}, '${date}')" aria-label="Remove entry">&times;</button>
              </div>
            `;
          }).join('');
          listHtml = `<div class="history-list">${rows}</div>`;
        }
        historyPanel = `
          <div class="history-panel">
            ${listHtml}
            <div class="backfill-row">
              <input type="date" id="backfill-date-${i}" class="add-input" max="${today}" />
              <select id="backfill-status-${i}" class="add-input">
                <option value="present">Present</option>
                <option value="absent">Absent</option>
                <option value="cancelled">No Class</option>
              </select>
              <button class="add-btn" onclick="backfill(${i})">Log</button>
            </div>
          </div>
        `;
      }

      return `
        <div class="subject-card">
          <div class="subject-head">
            <div>
              <div class="subject-code">${escapeHtml(subj.code)}</div>
              <div class="subject-name">${escapeHtml(subj.name)}</div>
            </div>
            <button class="delete-btn" onclick="deleteSubject(${i})" aria-label="Remove subject" title="Remove subject">&times;</button>
          </div>
          <div class="score-row">
            <span class="score-pct ${cls}">${fmtPct(pct)}</span>
            <span class="score-frac">${attended}/${total} classes</span>
          </div>
          <div class="progress-track">
            <div class="progress-fill ${cls}" style="width:${pct === null ? 0 : Math.min(pct * 100, 100)}%"></div>
          </div>
          <div class="bunk-line ${bunkCls}">${bunkText}</div>
          <div class="status-row">
            <button class="status-btn ${todayStatus === 'present' ? 'active-present' : ''}" onclick="markStatus(${i}, 'present')">Present</button>
            <button class="status-btn ${todayStatus === 'absent' ? 'active-absent' : ''}" onclick="markStatus(${i}, 'absent')">Absent</button>
            <button class="status-btn ${todayStatus === 'cancelled' ? 'active-cancelled' : ''}" onclick="markStatus(${i}, 'cancelled')">No Class</button>
          </div>
          <button class="history-toggle" onclick="toggleHistory(${i})">${isExpanded ? '▲ Hide log' : '▼ View log (' + total + ')'}</button>
          ${historyPanel}
        </div>
      `;
    }).join('');

    const overallPct = totalClasses > 0 ? totalAttended / totalClasses : null;
    const overallCls = statusClass(overallPct, threshold);

    const banner = storageAvailable ? '' : `
      <div class="storage-banner">
        Heads up — this is running outside Claude, so your data won't be saved between visits. Open this artifact from your Claude conversation (works the same on iPad/iPhone/desktop) to save your attendance to your account.
      </div>
    `;

    document.getElementById('app').innerHTML = `
      ${banner}
      <div class="eyebrow">Semester III · CSE</div>
      <h1 class="title">Attendance</h1>
      <div class="date-line">${todayDisplay()}</div>

      <div class="overall-card">
        <div class="overall-top">
          <div class="overall-label">Overall</div>
          <div class="overall-count">${totalAttended}/${totalClasses} classes logged</div>
        </div>
        <div class="overall-score ${overallCls}">${fmtPct(overallPct)}</div>
        <div class="progress-track">
          <div class="progress-fill ${overallCls}" style="width:${overallPct === null ? 0 : Math.min(overallPct * 100, 100)}%"></div>
        </div>
        <div class="threshold-row">
          Required minimum:
          <select onchange="changeThreshold(this.value)">
            <option value="0.65" ${threshold === 0.65 ? 'selected' : ''}>65%</option>
            <option value="0.70" ${threshold === 0.70 ? 'selected' : ''}>70%</option>
            <option value="0.75" ${threshold === 0.75 ? 'selected' : ''}>75%</option>
            <option value="0.80" ${threshold === 0.80 ? 'selected' : ''}>80%</option>
          </select>
        </div>
      </div>

      <div class="section-label">Subjects</div>
      <div class="subjects-grid">
        ${subjectCards}
      </div>

      <div class="add-card">
        <div class="section-label" style="margin-bottom:8px;">Add a subject</div>
        <div class="add-row">
          <input id="new-code" class="add-input code" type="text" placeholder="Code" />
          <input id="new-name" class="add-input name" type="text" placeholder="Subject name" onkeydown="if(event.key==='Enter') addSubject()" />
          <button class="add-btn" onclick="addSubject()">Add</button>
        </div>
      </div>

      <div class="footer-note">
        Tap a status again to unmark it &nbsp;·&nbsp; <button class="reset-link" onclick="resetAll()">Reset all data</button>
      </div>
    `;
  }

  function escapeHtml(str) {
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  // ---- Init ----
  (async function init() {
    data = await loadData();
    render();
  })();
})();
</script>
